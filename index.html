<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwindcss -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- daisyUi -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- fontawewsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <section>
        <div class="flex justify-center items-center min-h-screen">
            

<fieldset class="fieldset bg-[#FFFFFF] rounded-box w-xs border border-base-300 p-4">
                <img src="./assets/github-logo.png" alt="" class="mx-auto">
            <h1 class="">GitHub Issues Tracker</h1>
                <h2>Sign in to manage your issues</h2>
            

            <label class="label">Username</label>
             <input type="email" class="input" placeholder="Enter Username" />

            <label class="label">Password</label>
             <input type="password" class="input" placeholder="Enter Password" />

            <button class="btn btn-neutral mt-4  bg-blue-700">Sign in</button>
</fieldset>
        </div>

    </section>
    
</body>
</html>
