<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">
    
 <div class="bg-white p-8 rounded-2xl shadow-lg w-80 text-center">
   <span> <img src="./assets/github-logo.png" alt="" class="mx-auto"></span>
    <h1 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h1>
    <p class="text-gray-500 mb-6">Sign in to manage your issues</p>

    <input id="username" type="text" placeholder="Username"
      class="w-full mb-3 p-2 border rounded-lg">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-2 border rounded-lg">

    <button onclick="login()"
      class="w-full bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600">
      Sign In
    </button>

    <p class="text-sm text-gray-400 mt-4">
      Demo: admin / admin123
    </p>
  </div>


 
  <script src="script.js"></script>

</body>
</html>
