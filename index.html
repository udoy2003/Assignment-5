<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwindcss -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- daisyUi -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- fontawewsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    
  <div class="bg-white p-8 rounded-2xl shadow-lg w-80 text-center">
   <span> <img src="./assets/github-logo.png" alt="" class="mx-auto"></span>
    <h1 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h1>
    <p class="text-gray-500 mb-6">Sign in to manage your issues</p>

    <input id="username" type="text" placeholder="Username"
      class="w-full mb-3 p-2 border rounded-lg">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-2 border rounded-lg">

    <button onclick="login()"
      class="w-full bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600">
      Sign In
    </button>

    <p class="text-sm text-gray-400 mt-4">
      Demo: admin / admin123
    </p>
  </div>

  <script src="script.js"></script>

</body>
    

   
</html>
